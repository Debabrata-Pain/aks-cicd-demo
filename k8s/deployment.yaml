apiVersion: apps/v1

kind: Deployment

metadata:
  name: flaskdemo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: flaskdemo

  template:

    metadata:
      labels:
        app: flaskdemo

    spec:

      containers:

      - name: flaskdemo

        image: myacr.azurecr.io/flaskdemo:$(tag)

        ports:

        - containerPort: 5000